name: CI

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: windows-2022
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install Rust
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30
        with:
          toolchain: 1.86.0
          components: rustfmt, clippy

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets --locked -- -D warnings

      - name: Test
        run: cargo test --locked

      - name: Build updater helper test binary
        run: cargo build --locked

      - name: Test updater helper success hand-off
        shell: pwsh
        timeout-minutes: 3
        run: .\tests\updater_e2e.ps1 -Scenario Success

      - name: Test updater helper child-exit rollback
        shell: pwsh
        timeout-minutes: 3
        run: .\tests\updater_e2e.ps1 -Scenario ChildExit

      - name: Build release binary
        run: cargo build --release --locked
