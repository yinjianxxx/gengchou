name: Release

on:
  push:
    tags:
      - "v2.*"

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  release:
    runs-on: windows-2022
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Check retired identity allowlist
        shell: pwsh
        run: .\tools\check-retired-identity.ps1

      - name: Install Rust
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30
        with:
          toolchain: 1.86.0
          components: rustfmt, clippy

      - name: Verify tag and binary identity
        shell: pwsh
        run: |
          $metadata = cargo metadata --locked --no-deps --format-version 1 | ConvertFrom-Json
          $package = $metadata.packages |
            Where-Object { $_.name -eq "gengchou" } |
            Select-Object -First 1
          if ($null -eq $package) {
            throw "Package gengchou was not found."
          }
          $expectedTag = "v$($package.version)"
          if ($env:GITHUB_REF_NAME -ne $expectedTag) {
            throw "Tag $env:GITHUB_REF_NAME does not match Cargo version $expectedTag."
          }
          $binary = $package.targets |
            Where-Object { ($_.kind -contains "bin") -and ($_.name -eq "gengchou") } |
            Select-Object -First 1
          if ($null -eq $binary) {
            throw "Binary target gengchou was not found."
          }

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets --locked -- -D warnings

      - name: Test
        run: cargo test --locked

      - name: Build updater helper test binary
        run: cargo build --locked

      - name: Test current updater inbound readiness
        shell: pwsh
        timeout-minutes: 1
        run: .\tests\update_ready_inbound_e2e.ps1

      - name: Test updater helper success hand-off
        shell: pwsh
        timeout-minutes: 3
        run: .\tests\updater_e2e.ps1 -Scenario Success

      - name: Test updater helper child-exit rollback
        shell: pwsh
        timeout-minutes: 3
        run: .\tests\updater_e2e.ps1 -Scenario ChildExit

      - name: Build release binary
        run: cargo build --release --locked

      - name: Prepare release assets
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path dist -Force | Out-Null
          Copy-Item -LiteralPath target\release\gengchou.exe -Destination dist\gengchou.exe
          Copy-Item -LiteralPath LICENSE -Destination dist\LICENSE
          Copy-Item -LiteralPath THIRD_PARTY_NOTICES.md -Destination dist\THIRD_PARTY_NOTICES.md
          Copy-Item -LiteralPath DEPENDENCY_LICENSES.md -Destination dist\DEPENDENCY_LICENSES.md
          Copy-Item -LiteralPath README.md -Destination dist\README.md
          Copy-Item -LiteralPath README.zh-CN.md -Destination dist\README.zh-CN.md
          Copy-Item -LiteralPath PROVENANCE.md -Destination dist\PROVENANCE.md

          $bundleFiles = @(
            "dist\gengchou.exe",
            "dist\LICENSE",
            "dist\THIRD_PARTY_NOTICES.md",
            "dist\DEPENDENCY_LICENSES.md",
            "dist\README.md",
            "dist\README.zh-CN.md",
            "dist\PROVENANCE.md"
          )
          Compress-Archive -LiteralPath $bundleFiles -DestinationPath dist\gengchou-windows-x64.zip -Force

          Add-Type -AssemblyName System.IO.Compression.FileSystem
          $requiredCommonEntries = @(
            'LICENSE',
            'THIRD_PARTY_NOTICES.md',
            'DEPENDENCY_LICENSES.md',
            'README.md',
            'README.zh-CN.md',
            'PROVENANCE.md'
          )
          $bundle = @{ Path = 'dist\gengchou-windows-x64.zip'; Exe = 'gengchou.exe' }
          $archive = [System.IO.Compression.ZipFile]::OpenRead(
            (Resolve-Path -LiteralPath $bundle.Path)
          )
          try {
            $bundleEntries = @($archive.Entries | ForEach-Object { $_.FullName })
            foreach ($requiredEntry in @($bundle.Exe) + $requiredCommonEntries) {
              if ($requiredEntry -notin $bundleEntries) {
                throw ('Release bundle {0} is missing required entry: {1}' -f $bundle.Path, $requiredEntry)
              }
            }
            if ($bundleEntries.Count -ne 7) {
              throw ('Release bundle {0} has {1} entries; expected exactly 7.' -f $bundle.Path, $bundleEntries.Count)
            }
          }
          finally {
            $archive.Dispose()
          }

          $assetNames = @(
            "gengchou.exe",
            "gengchou-windows-x64.zip",
            "LICENSE",
            "THIRD_PARTY_NOTICES.md",
            "DEPENDENCY_LICENSES.md"
          )
          $hashLines = foreach ($name in $assetNames) {
            $path = Join-Path dist $name
            $hash = (Get-FileHash -LiteralPath $path -Algorithm SHA256).Hash.ToLowerInvariant()
            "$hash  $name"
          }
          $hashLines | Set-Content -LiteralPath dist\SHA256SUMS -Encoding ascii

      - name: Attest release binaries
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: |
            dist/gengchou.exe
            dist/gengchou-windows-x64.zip

      - name: Create and verify draft GitHub release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          $notesFile = Join-Path '.github/release-notes' ($env:GITHUB_REF_NAME + '.md')
          if (-not (Test-Path -LiteralPath $notesFile -PathType Leaf)) {
            throw ('Release notes file not found: {0}' -f $notesFile)
          }
          $notes = Get-Content -LiteralPath $notesFile -Raw
          if ($notes.Contains('RELEASE_NOTES_TODO')) {
            throw ('Release notes still contain placeholders: {0}' -f $notesFile)
          }

          gh release create $env:GITHUB_REF_NAME `
            dist/gengchou.exe `
            dist/gengchou-windows-x64.zip `
            dist/LICENSE `
            dist/THIRD_PARTY_NOTICES.md `
            dist/DEPENDENCY_LICENSES.md `
            dist/SHA256SUMS `
            --verify-tag `
            --draft `
            --title "Gengchou $env:GITHUB_REF_NAME" `
            --notes-file $notesFile
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

          New-Item -ItemType Directory -Path release-verify -Force | Out-Null
          gh release download $env:GITHUB_REF_NAME --dir release-verify
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

          $verifiedNames = @()
          foreach ($line in Get-Content -LiteralPath release-verify\SHA256SUMS) {
            if ($line -notmatch '^(?<hash>[0-9a-fA-F]{64})  (?<name>.+)$') {
              throw ('Invalid SHA256SUMS line: {0}' -f $line)
            }
            $assetPath = Join-Path release-verify $Matches.name
            if (-not (Test-Path -LiteralPath $assetPath -PathType Leaf)) {
              throw ('Downloaded release is missing checksummed asset: {0}' -f $Matches.name)
            }
            $actual = (Get-FileHash -LiteralPath $assetPath -Algorithm SHA256).Hash
            if ($actual -ne $Matches.hash) {
              throw ('Downloaded release asset failed SHA-256 verification: {0}' -f $Matches.name)
            }
            $verifiedNames += $Matches.name
          }
          $requiredVerifiedAssets = @(
            'gengchou.exe',
            'gengchou-windows-x64.zip',
            'LICENSE',
            'THIRD_PARTY_NOTICES.md',
            'DEPENDENCY_LICENSES.md'
          )
          foreach ($name in $requiredVerifiedAssets) {
            if ($name -notin $verifiedNames) {
              throw ('SHA256SUMS is missing required release asset: {0}' -f $name)
            }
          }
          if ($verifiedNames.Count -ne $requiredVerifiedAssets.Count) {
            throw ('SHA256SUMS has {0} payload entries; expected exactly {1}.' -f $verifiedNames.Count, $requiredVerifiedAssets.Count)
          }
          $downloadedNames = @(
            Get-ChildItem -LiteralPath release-verify -File |
              ForEach-Object { $_.Name }
          )
          $expectedDownloadedNames = @($requiredVerifiedAssets) + 'SHA256SUMS'
          if (
            $downloadedNames.Count -ne $expectedDownloadedNames.Count -or
            @($downloadedNames | Where-Object { $_ -notin $expectedDownloadedNames }).Count -ne 0
          ) {
            throw ('Draft release has an unexpected asset set: {0}' -f ($downloadedNames -join ', '))
          }

          gh attestation verify release-verify\gengchou.exe --repo $env:GH_REPO
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          gh attestation verify release-verify\gengchou-windows-x64.zip --repo $env:GH_REPO
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

          gh release edit $env:GITHUB_REF_NAME --draft=false
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
