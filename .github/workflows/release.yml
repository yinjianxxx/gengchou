name: Release

on:
  push:
    tags:
      - "v2.*"

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-2022
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install Rust
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30
        with:
          toolchain: stable
          components: rustfmt

      - name: Verify tag and binary identity
        shell: pwsh
        run: |
          $metadata = cargo metadata --locked --no-deps --format-version 1 | ConvertFrom-Json
          $package = $metadata.packages |
            Where-Object { $_.name -eq "ai-usage-monitor" } |
            Select-Object -First 1
          if ($null -eq $package) {
            throw "Package ai-usage-monitor was not found."
          }
          $expectedTag = "v$($package.version)"
          if ($env:GITHUB_REF_NAME -ne $expectedTag) {
            throw "Tag $env:GITHUB_REF_NAME does not match Cargo version $expectedTag."
          }
          $binary = $package.targets |
            Where-Object { ($_.kind -contains "bin") -and ($_.name -eq "ai-usage-monitor") } |
            Select-Object -First 1
          if ($null -eq $binary) {
            throw "Binary target ai-usage-monitor was not found."
          }

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Test
        run: cargo test --locked

      - name: Build release binary
        run: cargo build --release --locked

      - name: Prepare release assets
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path dist -Force | Out-Null
          Copy-Item -LiteralPath target\release\ai-usage-monitor.exe -Destination dist\ai-usage-monitor.exe
          Copy-Item -LiteralPath LICENSE -Destination dist\LICENSE
          Copy-Item -LiteralPath THIRD_PARTY_NOTICES.md -Destination dist\THIRD_PARTY_NOTICES.md
          Copy-Item -LiteralPath DEPENDENCY_LICENSES.md -Destination dist\DEPENDENCY_LICENSES.md
          Copy-Item -LiteralPath README.md -Destination dist\README.md
          Copy-Item -LiteralPath README.zh-CN.md -Destination dist\README.zh-CN.md
          Copy-Item -LiteralPath PROVENANCE.md -Destination dist\PROVENANCE.md

          $bundleFiles = @(
            "dist\ai-usage-monitor.exe",
            "dist\LICENSE",
            "dist\THIRD_PARTY_NOTICES.md",
            "dist\DEPENDENCY_LICENSES.md",
            "dist\README.md",
            "dist\README.zh-CN.md",
            "dist\PROVENANCE.md"
          )
          Compress-Archive -LiteralPath $bundleFiles -DestinationPath dist\ai-usage-monitor-windows-x64.zip -Force

          Add-Type -AssemblyName System.IO.Compression.FileSystem
          $requiredBundleEntries = @(
            'ai-usage-monitor.exe',
            'LICENSE',
            'THIRD_PARTY_NOTICES.md',
            'DEPENDENCY_LICENSES.md',
            'README.md',
            'README.zh-CN.md',
            'PROVENANCE.md'
          )
          $archive = [System.IO.Compression.ZipFile]::OpenRead(
            (Resolve-Path -LiteralPath dist\ai-usage-monitor-windows-x64.zip)
          )
          try {
            $bundleEntries = @($archive.Entries | ForEach-Object { $_.FullName })
            foreach ($requiredEntry in $requiredBundleEntries) {
              if ($requiredEntry -notin $bundleEntries) {
                throw ('Release bundle is missing required entry: {0}' -f $requiredEntry)
              }
            }
          }
          finally {
            $archive.Dispose()
          }

          $assetNames = @(
            "ai-usage-monitor.exe",
            "ai-usage-monitor-windows-x64.zip",
            "LICENSE",
            "THIRD_PARTY_NOTICES.md",
            "DEPENDENCY_LICENSES.md"
          )
          $hashLines = foreach ($name in $assetNames) {
            $path = Join-Path dist $name
            $hash = (Get-FileHash -LiteralPath $path -Algorithm SHA256).Hash.ToLowerInvariant()
            "$hash  $name"
          }
          $hashLines | Set-Content -LiteralPath dist\SHA256SUMS -Encoding ascii

      - name: Publish GitHub release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          $notesFile = Join-Path '.github/release-notes' ($env:GITHUB_REF_NAME + '.md')
          if (-not (Test-Path -LiteralPath $notesFile -PathType Leaf)) {
            throw ('Release notes file not found: {0}' -f $notesFile)
          }
          $notes = Get-Content -LiteralPath $notesFile -Raw
          if ($notes.Contains('RELEASE_NOTES_TODO')) {
            throw ('Release notes still contain placeholders: {0}' -f $notesFile)
          }

          gh release create $env:GITHUB_REF_NAME `
            dist/ai-usage-monitor.exe `
            dist/ai-usage-monitor-windows-x64.zip `
            dist/LICENSE `
            dist/THIRD_PARTY_NOTICES.md `
            dist/DEPENDENCY_LICENSES.md `
            dist/SHA256SUMS `
            --verify-tag `
            --title "AI Usage Monitor $env:GITHUB_REF_NAME" `
            --notes-file $notesFile
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
